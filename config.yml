server:
    listen: 0.0.0.0
    port: 53
    # Can be "debug", "info", "warn", "error"
    log_level: info
resolver:
    timeout: 3
    max_depth: 10
    # Maximum simultaneous upstream resolutions. 0 = unlimited.
    max_concurrent: 64
    edns0: true
    tcp_fallback: true
    cache:
        enabled: true
        negative_ttl: 300
        prefetch: true
        min_ttl: 30
    forwarder:
        # Set enabled: true to forward queries to upstream resolvers instead of
        # iterating from root. Much faster; trades iterative accuracy for speed.
        enabled: false
        servers:
            - 1.1.1.1
            - 8.8.8.8
        # If all forwarders fail, fall back to full iterative resolution.
        fallback_to_iterative: true
records:
    - name: example.home
      type: A
      ttl: 3600
      value: 192.168.1.50
filtering:
    mode: "off"
    inline:
        - ads.example.com
        - tracker.example.net
    lists:
        - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
        - /etc/kmresolv/custom.list
dashboard:
    enabled: true
    listen: 0.0.0.0
    port: 8080
    auth:
        # Leave username and password empty to disable authentication
        username: "admin"
        password: "changeme"
updater:
    check_enabled: true
minecraft:
    enabled: false
    listen: 0.0.0.0
    port: 25565
    min_ram: 1G
    max_ram: 2G
